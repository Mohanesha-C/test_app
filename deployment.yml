apiVersion: apps/v1
kind: Deployment
metadata:
  name: struts-deployment
  labels:
    app: struts-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: struts-app
  template:
    metadata:
      labels:
        app: struts-app
    spec:
      containers:
        - name: struts-container
          image: local-struts-app:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: struts-service
spec:
  type: NodePort
  selector:
    app: struts-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
